

{% extends "base.html" %}
{% load bootstrap4 %}

{% block content %}
<div class="container">
    <h3>Create Resource:</h3>
        <!-- The provenance of the following code is from the bioweb app from the refernce mentioned above -->
        <!-- Adds form with POST request method and send the data in multi format -->
    <form id="resource_form"  method="post"  enctype="multipart/form-data">
        {% csrf_token %}
        {{resource_form.as_p}}
        {{resource_type_form.as_p}}
        <input class="btn btn-primary" type="submit" name="submit" value="Save">
    </form>
</div>
{% endblock %}
