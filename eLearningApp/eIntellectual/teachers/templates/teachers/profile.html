
{% extends "base.html" %}
{% load bootstrap4 %}

{% block content %}
<div class="container-fluid p-5">
    <h3>Teacher Profile:</h3>
    <div class="row d-flex mt-5">
        <div class="col-sm-3 media">
            <a class="align-self-center" href="#"><img class="img-thumbnail" src="/images/{{teacher.photo}}" ></a>
        </div>
        <div class="col">
            <h4>{{teacher.user_name.title}}</h4>
            <h6>{{teacher.name.title}} {{teacher.last_name.title}} </h6>
            <p>Teacher since: {{teacher.start_date.date}} </p>
            <br>
            <h6>{{teacher.email}}</h6>
            <div class="mt-5">
                <a class="btn btn-primary ml-4" href="/teacher/profile/update/{{teacher.pk}}" role="button">Update Profile</a>
                <a class="btn btn-primary ml-4" href="/teacher/change-password" role="button">Change Password</a>
                <a class="btn btn-danger ml-4" href="#" role="button">Delete Account</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
